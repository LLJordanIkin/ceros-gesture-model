<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Model</title>

  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f4f4f4;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #f4f4f4;
    }
  </style>
</head>

<body>
  <model-viewer
    src="doctor-v2.glb?v=1"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    alt="3D doctor model">
  </model-viewer>
</body>
</html>
